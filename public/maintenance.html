<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GameDex | Manutencao</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background:
          radial-gradient(circle at 20% 20%, rgba(124, 58, 237, 0.22), transparent 35%),
          radial-gradient(circle at 80% 70%, rgba(34, 211, 238, 0.16), transparent 40%),
          #06070b;
        color: #edf2ff;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(640px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: linear-gradient(170deg, rgba(20, 20, 27, 0.96), rgba(10, 10, 14, 0.98));
        border-radius: 18px;
        padding: 28px 24px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      }

      .kicker {
        margin: 0 0 8px;
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #a78bfa;
        font-weight: 700;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(26px, 5vw, 38px);
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: #b5c1da;
        line-height: 1.7;
      }

      .status {
        margin-top: 18px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        border: 1px solid rgba(250, 204, 21, 0.4);
        background: rgba(250, 204, 21, 0.14);
        color: #fde68a;
        padding: 6px 12px;
        font-size: 13px;
        font-weight: 700;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #fde68a;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="kicker">GameDex</p>
      <h1>Voltamos amanha</h1>
      <p>
        O site esta temporariamente indisponivel durante a madrugada para manutencao e melhorias.
        Obrigado pela paciencia.
      </p>
      <div class="status">
        <span class="dot"></span>
        Manutencao em andamento
      </div>
    </main>
  </body>
</html>
